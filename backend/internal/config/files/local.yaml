# Mnema config — local development.
#
# Loaded by config.Load() when APP_ENV=local. Embedded into the binary
# at build time via //go:embed; never read from disk at runtime.
#
# Values like ${ENV_VAR} are expanded from process environment after
# YAML parsing — secrets stay out of the repo while the structure stays
# under version control.

env: local

http:
  port: 8080

log:
  level: debug

app:
  base_url: http://localhost:5173

# Postgres in docker-compose; full URL kept here so that swapping ports
# or db names is a one-file change.
database:
  url: postgres://mnema:mnema@localhost:5432/mnema?sslmode=disable

jwt:
  # Local-only placeholder; prod must override via env.
  secret: change-me-locally
  access_ttl: 15m
  refresh_ttl: 720h

# Mailpit captures all SMTP locally on :1025.
smtp:
  host: localhost
  port: 1025
  from: noreply@mnema.local

# MinIO with default dev credentials from docker-compose.
s3:
  endpoint: http://localhost:9000
  access_key: mnema
  secret_key: mnemamnema
  bucket: mnema-media
  use_path_style: true

# Stub LLM is deterministic — no API key needed locally. Switch
# provider to "openai" and set OPENAI_API_KEY to test against the real
# model.
llm:
  provider: stub
  openai_api_key: ${OPENAI_API_KEY}
  extraction_model: gpt-4o-mini
  # chat_model is what /v1/conversations/.../messages uses. Falls back
  # to extraction_model if empty, so existing configs keep working.
  chat_model: gpt-4o-mini
  # Hard ceiling on assistant reply length so a runaway response can't
  # rack up unbounded cost. System prompt asks for 1–3 sentences.
  chat_max_tokens: 512
  embedding_model: text-embedding-3-small
  # Recall pipeline uses its own provider switch — running chat on
  # stub/openai while recall stays on a local ollama is supported.
  # Default on local dev is ollama+qwen2.5:7b so /v1/recall returns
  # real answers without an OpenAI key.
  recall:
    provider: ollama
    ollama_url: http://localhost:11434
    ollama_model: qwen2.5:7b
  # Extraction pipeline (message → graph nodes/edges) on a local ollama
  # too — chat stays on stub for speed/determinism while the graph
  # actually fills with real decomposed entities (person/place/event/...).
  extraction:
    provider: ollama
    ollama_url: http://localhost:11434
    ollama_model: qwen2.5:7b
