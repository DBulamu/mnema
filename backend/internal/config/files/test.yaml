# Mnema config — automated tests.
#
# Loaded by config.Load() when APP_ENV=test. Wires deterministic / in-
# memory adapters so tests never touch real services:
#  - LLM provider "stub" (deterministic reply, no network)
#  - Mailer "captor" (in-memory, asserts on captured emails)
#
# Database URL is intentionally taken from the environment so the test
# runner can spin up a per-suite Postgres (e.g. testcontainers) and
# point us at it.

env: test

http:
  port: 8080

log:
  level: warn

app:
  base_url: http://localhost:5173

database:
  url: ${DATABASE_URL}

jwt:
  secret: test-secret-do-not-use-anywhere-else
  access_ttl: 15m
  refresh_ttl: 1h

# Captor is wired by env, not by host/port — these are placeholders so
# config validation passes.
smtp:
  host: captor
  port: 0
  from: noreply@mnema.test

s3:
  endpoint: ${S3_ENDPOINT}
  access_key: ${S3_ACCESS_KEY}
  secret_key: ${S3_SECRET_KEY}
  bucket: mnema-test
  use_path_style: true

llm:
  provider: stub
  openai_api_key: ""
  extraction_model: gpt-4o-mini
  embedding_model: text-embedding-3-small
  # Tests run against the recall stub triplet — no ollama dependency.
  recall:
    provider: stub
    ollama_url: ""
    ollama_model: ""
